name: arteci

services:
  minio:
    image: minio/minio:latest
    container_name: arteci-minio
    command: server /data --address ":${MINIO_PORT:-9000}" --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    ports:
      - "${MINIO_PORT:-9000}:${MINIO_PORT:-9000}"
      - "${MINIO_CONSOLE_PORT:-9001}:${MINIO_CONSOLE_PORT:-9001}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${MINIO_PORT:-9000}/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - arteci

  minio-init:
    image: minio/mc:latest
    container_name: arteci-minio-init
    entrypoint: ["/bin/sh", "/scripts/minio-init.sh"]
    environment:
      MINIO_ENDPOINT: arteci-minio
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-arteci}
    volumes:
      - ../ressources:/data/ressources:ro
      - ../fixtures:/data/fixtures:ro
      - ./scripts/minio-init.sh:/scripts/minio-init.sh:ro
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure
    networks:
      - arteci

  api-go:
    build:
      context: ../go
      dockerfile: Dockerfile
    container_name: arteci-api-go
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    environment:
      PORT: ${API_PORT:-3001}
      MINIO_ENDPOINT: arteci-minio
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-arteci}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-ingest.us2.signoz.cloud:443}
      OTEL_EXPORTER_OTLP_HEADERS: signoz-ingestion-key=${SIGNOZ_INGESTION_KEY}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-arteci-api-go}
    depends_on:
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - arteci

volumes:
  minio-data:

networks:
  arteci:
    driver: bridge
