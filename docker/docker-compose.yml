name: arteci

services:
  minio:
    image: minio/minio:latest
    container_name: arteci-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - arteci

  minio-init:
    image: minio/mc:latest
    container_name: arteci-minio-init
    entrypoint: ["/bin/sh", "/scripts/minio-init.sh"]
    volumes:
      - ../ressources:/data/ressources:ro
      - ../fixtures:/data/fixtures:ro
      - ./scripts/minio-init.sh:/scripts/minio-init.sh:ro
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure
    networks:
      - arteci

  api-go:
    build:
      context: ../go
      dockerfile: Dockerfile
    container_name: arteci-api-go
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      MINIO_ENDPOINT: arteci-minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: arteci
      OTEL_EXPORTER_OTLP_ENDPOINT: signoz-otel-collector:4317
      OTEL_SERVICE_NAME: arteci-api-go
    depends_on:
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - arteci

volumes:
  minio-data:

networks:
  arteci:
    external: true
    name: arteci
