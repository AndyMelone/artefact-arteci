name: signoz

services:
  signoz-clickhouse:
    image: clickhouse/clickhouse-server:24.1.2-alpine
    container_name: signoz-clickhouse
    restart: unless-stopped
    volumes:
      - signoz-clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - signoz

  signoz-schema-migrator:
    image: signoz/schema-migrator:0.111.25
    container_name: signoz-schema-migrator
    command: ["sync"]
    environment:
      CLICKHOUSE_URL: tcp://signoz-clickhouse:9000
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
    restart: on-failure
    networks:
      - signoz

  signoz-otel-collector:
    image: signoz/signoz-otel-collector:0.111.25
    container_name: signoz-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./signoz-otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      signoz-schema-migrator:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - arteci
      - signoz

  signoz-query-service:
    image: signoz/query-service:0.55.0
    container_name: signoz-query-service
    environment:
      ClickHouseUrl: tcp://signoz-clickhouse:9000
      STORAGE: clickhouse
      TELEMETRY_ENABLED: "false"
    depends_on:
      signoz-schema-migrator:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - signoz

  signoz-frontend:
    image: signoz/frontend:0.55.0
    container_name: signoz-frontend
    ports:
      - "3301:3301"
    depends_on:
      - signoz-query-service
    restart: unless-stopped
    networks:
      - signoz

volumes:
  signoz-clickhouse-data:

networks:
  # Réseau partagé avec arteci pour que l'API puisse envoyer les traces au collector
  arteci:
    name: arteci
    driver: bridge
  # Réseau interne SigNoz (clickhouse, query-service, frontend)
  signoz:
    driver: bridge
