apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: arteci
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox:latest
          command: ["sh", "-c", "until nc -z minio-service 9000; do echo waiting for minio; sleep 3; done"]
      containers:
        - name: minio-init
          image: minio/mc:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Install wget for Google Drive fallback
              if ! command -v wget > /dev/null 2>&1; then
                apk add --no-cache wget 2>/dev/null || true
              fi

              mc alias set local http://minio-service:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY}
              mc mb --ignore-existing local/arteci
              echo "[minio-init] bucket arteci ready"

              get_drive_id() {
                case "$1" in
                  lst_of_users_anon_2.csv) echo "1547HnOZWAGCE5YoweHhUuSd_1AiueqaP" ;;
                  *) echo "" ;;
                esac
              }

              for f in lst_of_users_anon_1.csv lst_of_users_anon_2.csv lst_of_users_anon_3.csv; do
                if mc stat "local/arteci/$f" > /dev/null 2>&1; then
                  echo "[minio-init] $f already present, skipped"
                  continue
                fi

                uploaded=0

                drive_id=$(get_drive_id "$f")
                if [ -n "$drive_id" ] && command -v wget > /dev/null 2>&1; then
                  echo "[minio-init] downloading $f from Google Drive..."
                  if wget -q -O "/tmp/$f" "https://drive.usercontent.google.com/download?id=${drive_id}&export=download&confirm=t"; then
                    mc cp "/tmp/$f" "local/arteci/$f"
                    rm -f "/tmp/$f"
                    echo "[minio-init] $f uploaded from Google Drive"
                    uploaded=1
                  else
                    echo "[minio-init] Google Drive unavailable for $f, trying ConfigMap..."
                    rm -f "/tmp/$f"
                  fi
                fi

                if [ "$uploaded" = "0" ]; then
                  if [ -f "/fixtures/$f" ]; then
                    mc cp "/fixtures/$f" "local/arteci/$f"
                    echo "[minio-init] $f uploaded from ConfigMap"
                  else
                    echo "[minio-init] WARNING: $f not found in any source"
                  fi
                fi
              done
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: arteci-api-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: arteci-api-secret
                  key: MINIO_SECRET_KEY
          volumeMounts:
            - name: fixtures
              mountPath: /fixtures
      volumes:
        - name: fixtures
          configMap:
            name: arteci-fixtures
