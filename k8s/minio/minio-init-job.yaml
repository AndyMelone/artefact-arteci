apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: arteci
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox:latest
          command: ["sh", "-c", "until nc -z minio-service 9000; do echo waiting for minio; sleep 3; done"]
      containers:
        - name: minio-init
          image: minio/mc:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              mc alias set local http://minio-service:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY}
              mc mb --ignore-existing local/arteci
              echo "[minio-init] bucket arteci ready"

              for f in lst_of_users_anon_1.csv lst_of_users_anon_2.csv lst_of_users_anon_3.csv; do
                if mc stat "local/arteci/$f" > /dev/null 2>&1; then
                  echo "[minio-init] $f already present, skipped"
                elif [ -f "/fixtures/$f" ]; then
                  mc cp "/fixtures/$f" "local/arteci/$f"
                  echo "[minio-init] $f uploaded from fixtures"
                else
                  echo "[minio-init] WARNING: $f not found"
                fi
              done
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: arteci-api-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: arteci-api-secret
                  key: MINIO_SECRET_KEY
          volumeMounts:
            - name: fixtures
              mountPath: /fixtures
      volumes:
        - name: fixtures
          configMap:
            name: arteci-fixtures
