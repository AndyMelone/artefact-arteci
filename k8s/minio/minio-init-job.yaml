apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: arteci
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox:latest
          command: ["sh", "-c", "until nc -z minio-service ${MINIO_PORT}; do echo waiting for minio; sleep 3; done"]
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "32Mi"
      containers:
        - name: minio-init
          image: minio/mc:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              if ! command -v wget > /dev/null 2>&1; then
                apk add --no-cache wget 2>/dev/null || true
              fi

              mc alias set local http://minio-service:${MINIO_PORT} ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY}
              mc mb --ignore-existing "local/${MINIO_BUCKET}"
              echo "[minio-init] bucket '${MINIO_BUCKET}' ready"

              # Single source of truth for Google Drive IDs —
              # go/internal/storage/drive-ids.env, also embedded into the Go
              # binary and mounted into Docker Compose's minio-init.
              # Pure shell (no grep — not present in minio/mc's base image).
              get_drive_id() {
                [ -f /host-drive-ids/drive-ids.env ] || return
                while IFS='=' read -r name id; do
                  if [ "$name" = "$1" ]; then
                    echo "$id"
                    return
                  fi
                done < /host-drive-ids/drive-ids.env
              }

              for f in lst_of_users_anon_1.csv; do
                if mc stat "local/${MINIO_BUCKET}/$f" > /dev/null 2>&1; then
                  echo "[minio-init] $f already present, skipped"
                  continue
                fi

                uploaded=0

                drive_id=$(get_drive_id "$f")
                if [ -n "$drive_id" ] && command -v wget > /dev/null 2>&1; then
                  echo "[minio-init] downloading $f from Google Drive..."
                  if wget -q -O "/tmp/$f" "https://drive.usercontent.google.com/download?id=${drive_id}&export=download&confirm=t"; then
                    mc cp "/tmp/$f" "local/${MINIO_BUCKET}/$f"
                    rm -f "/tmp/$f"
                    echo "[minio-init] $f uploaded from Google Drive"
                    uploaded=1
                  else
                    echo "[minio-init] Google Drive unavailable for $f, trying ConfigMap..."
                    rm -f "/tmp/$f"
                  fi
                fi

                if [ "$uploaded" = "0" ] && [ -f "/host-ressources/$f" ]; then
                  echo "[minio-init] $f found in ../ressources (synced from host), uploading full-size file..."
                  mc cp "/host-ressources/$f" "local/${MINIO_BUCKET}/$f"
                  echo "[minio-init] $f uploaded from ../ressources"
                  uploaded=1
                fi

                if [ "$uploaded" = "0" ]; then
                  if [ -f "/fixtures/$f" ]; then
                    echo "[minio-init] WARNING: only the 200-row sample fixture is available for $f (no ../ressources, Google Drive unreachable)"
                    mc cp "/fixtures/$f" "local/${MINIO_BUCKET}/$f"
                    echo "[minio-init] $f uploaded from ConfigMap sample"
                  else
                    echo "[minio-init] WARNING: $f not found in any source"
                  fi
                fi
              done
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: arteci-api-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: arteci-api-secret
                  key: MINIO_SECRET_KEY
            - name: MINIO_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: arteci-api-config
                  key: MINIO_BUCKET
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: fixtures
              mountPath: /fixtures
            - name: ressources
              mountPath: /host-ressources
              readOnly: true
            - name: drive-ids
              mountPath: /host-drive-ids
              readOnly: true
      volumes:
        - name: fixtures
          configMap:
            name: arteci-fixtures
        - name: ressources
          hostPath:
            path: /home/vagrant/ressources
            type: DirectoryOrCreate
        - name: drive-ids
          hostPath:
            path: /home/vagrant/drive-ids-src
            type: DirectoryOrCreate
