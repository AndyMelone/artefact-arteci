global:
  storageClass: ""         

# ClickHouse 
clickhouse:
  replicaCount: 1        

  persistence:
    enabled: true
    size: 50Gi

# OTel Collector
otelCollector:
  replicaCount: 1

# Query Service
queryService:
  replicaCount: 1

  # Désactiver la télémétrie SigNoz vers leur cloud
  env:
    - name: TELEMETRY_ENABLED
      value: "false"

# Frontend
frontend:
  replicaCount: 1

  service:
    type: ClusterIP         
    port: 3301

  # Ingress (décommenter et adapter si cluster avec Ingress controller)
  # ingress:
  #   enabled: true
  #   className: nginx
  #   hosts:
  #     - host: signoz.arteci.internal
  #       paths:
  #         - path: /
  #           pathType: Prefix

# Alertmanager
alertmanager:
  enabled: true
  replicaCount: 1

resources:
  clickhouse:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
  queryService:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  otelCollector:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
