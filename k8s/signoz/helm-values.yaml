# Repo:  helm repo add signoz https://charts.signoz.io

global:
  storageClass: ""

postgresql:
  enabled: true
  auth:
    database: signoz
    username: signoz
    password: signoz
  primary:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

clickhouseKeeper:
  enabled: true
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

clickhouse:
  replicaCount: 1
  persistence:
    enabled: true
    size: 50Gi
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi


signoz:
  replicaCount: 1
  env:
    TELEMETRY_ENABLED: "false"
    SIGNOZ_TOKENIZER_JWT_SECRET: "arteci-signoz-local-secret-key-32chars"
    # Auto-provision the first org/admin at startup (v0.112.0+) — without this,
    # OpAMP can never register the collector agent ("cannot create agent
    # without orgId") because no org exists until someone completes the web
    # signup wizard by hand. See https://signoz.io/docs/manage/administrator-guide/configuration/root-user/
    SIGNOZ_USER_ROOT_ENABLED: "true"
    SIGNOZ_USER_ROOT_EMAIL: "admin@arteci.local"
    SIGNOZ_USER_ROOT_PASSWORD: "Arteci-Signoz-Admin-2026"
    SIGNOZ_USER_ROOT_ORG_NAME: "arteci"
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

ingester:
  replicaCount: 1
  service:
    type: ClusterIP
    ports:
      grpc: 4317
      http: 4318
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
