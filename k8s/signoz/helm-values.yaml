# Repo:  helm repo add signoz https://charts.signoz.io

global:
  storageClass: ""

postgresql:
  enabled: true
  auth:
    database: signoz
    username: signoz
    # password supplied at deploy time via --set-string from SIGNOZ_POSTGRES_PASSWORD (.env)
  primary:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

clickhouseKeeper:
  enabled: true
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

clickhouse:
  replicaCount: 1
  persistence:
    enabled: true
    size: 50Gi
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi


signoz:
  replicaCount: 1
  env:
    TELEMETRY_ENABLED: "false"
    # SIGNOZ_TOKENIZER_JWT_SECRET supplied via --set-string from SIGNOZ_JWT_SECRET (.env)
    #
    # Auto-provision the first org/admin at startup (v0.112.0+) — without this,
    # OpAMP can never register the collector agent ("cannot create agent
    # without orgId") because no org exists until someone completes the web
    # signup wizard by hand. See https://signoz.io/docs/manage/administrator-guide/configuration/root-user/
    # SIGNOZ_USER_ROOT_ENABLED/EMAIL/PASSWORD/ORG_NAME supplied via --set-string
    # from SIGNOZ_ROOT_EMAIL / SIGNOZ_ROOT_PASSWORD / SIGNOZ_ROOT_ORG_NAME (.env)
    SIGNOZ_USER_ROOT_ENABLED: "true"
  service:
    # LoadBalancer: k3s' ServiceLB binds this on the Vagrant VM's forwarded
    # port 8080, giving direct UI access on localhost:8080 with no manual
    # `kubectl port-forward` — convenient for this local sandbox only. On a
    # real cloud cluster, put this behind ClusterIP + Ingress + auth instead.
    type: LoadBalancer
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

ingester:
  replicaCount: 1
  service:
    type: ClusterIP
    ports:
      grpc: 4317
      http: 4318
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
